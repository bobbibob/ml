name: ML API Migration Validator

# Запускается вручную когда приходят API ключи
on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'Mercado Livre API Key'
        required: true
        type: string
      api_secret:
        description: 'Mercado Livre API Secret'
        required: true
        type: string
      auto_merge:
        description: 'Auto-merge PR if validation passes?'
        required: false
        default: 'true'
        type: boolean

jobs:
  validate-and-migrate:
    runs-on: ubuntu-latest
    env:
      ML_API_KEY: ${{ github.event.inputs.api_key }}
      ML_API_SECRET: ${{ github.event.inputs.api_secret }}
      KEYSTORE_PATH: /home/runner/ml-release.keystore
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
      R2_OBJECT_KEY: ${{ secrets.R2_OBJECT_KEY }}
      R2_REGION: ${{ secrets.R2_REGION }}
      UPDATED_BY: ${{ secrets.UPDATED_BY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          python3 - <<'PY'
          import os, base64
          data = os.environ["KEYSTORE_BASE64"].strip()
          data = "".join(data.split())
          with open("/home/runner/ml-release.keystore", "wb") as f:
              f.write(base64.b64decode(data))
          print("✓ Keystore decoded")
          PY

      - name: Validate API Credentials
        id: validate_api
        run: |
          echo "🔍 Validating API credentials..."
          
          # Проверяем что ключи не пусты
          if [ -z "$ML_API_KEY" ] || [ -z "$ML_API_SECRET" ]; then
            echo "error=API credentials are empty" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Проверяем формат ключей (примерный)
          if [[ ! "$ML_API_KEY" =~ ^[A-Za-z0-9_-]{20,}$ ]]; then
            echo "⚠️  Warning: API Key format looks unusual"
          fi
          
          echo "status=valid" >> $GITHUB_OUTPUT
          echo "✓ API credentials validated"

      - name: Build with API Enabled
        id: build_api
        run: |
          echo "🔨 Building app with ML_API enabled..."
          
          # Временно включаем API флаг
          sed -i 's/USE_ML_API", "false/USE_ML_API", "true/' app/build.gradle.kts
          
          ./gradlew :app:assembleDebug \
            -PmlApiKey="$ML_API_KEY" \
            -PmlApiSecret="$ML_API_SECRET" \
            2>&1 | tee build.log
          
          if [ $? -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✓ Build succeeded with API enabled"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Build failed with API enabled"
            exit 1
          fi

      - name: Run API Compatibility Tests
        id: test_api
        continue-on-error: true
        run: |
          echo "🧪 Running API compatibility tests..."
          
          ./gradlew :app:testDebug \
            -PmlApiKey="$ML_API_KEY" \
            -PmlApiSecret="$ML_API_SECRET" \
            2>&1 | tee test.log
          
          if [ $? -eq 0 ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✓ Tests passed"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "⚠️  Some tests failed (this is expected during API development)"
          fi

      - name: Lint and Code Quality
        id: lint
        continue-on-error: true
        run: |
          echo "📋 Running lint checks..."
          
          ./gradlew :app:lint 2>&1 | tee lint.log || true
          
          if grep -q "0 errors" lint.log; then
            echo "status=clean" >> $GITHUB_OUTPUT
            echo "✓ No lint errors"
          else
            echo "status=warnings" >> $GITHUB_OUTPUT
            echo "⚠️  Some lint warnings found"
          fi

      - name: Restore Original State
        if: always()
        run: |
          # Восстанавливаем исходный файл (парсинг по умолчанию)
          git checkout app/build.gradle.kts

      - name: Create Migration Branch
        if: success() && steps.build_api.outputs.status == 'success'
        run: |
          git config user.name "ML Migration Bot"
          git config user.email "ml-migration@github.actions"
          
          BRANCH_NAME="feature/ml-api-migration-$(date +%s)"
          echo "MIGRATION_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV
          
          git checkout -b "$BRANCH_NAME"
          
          # Включаем API флаг постоянно
          sed -i 's/USE_ML_API", "false/USE_ML_API", "true/' app/build.gradle.kts
          
          # Обновляем версию
          CURRENT_VERSION=$(grep versionCode app/build.gradle.kts | grep -oE '[0-9]+' | head -1)
          NEW_VERSION=$((CURRENT_VERSION + 1))
          sed -i "s/versionCode = $CURRENT_VERSION/versionCode = $NEW_VERSION/" app/build.gradle.kts
          sed -i 's/versionName = "[^"]*"/versionName = "1.1.0-api"/' app/build.gradle.kts
          
          git add app/build.gradle.kts
          git commit -m "🚀 Enable Mercado Livre Official API (v1.1.0)

          - Switch from WebView parsing to official API
          - Improved stability and performance
          - Added proper error handling and session management
          - Feature flag allows quick rollback if needed
          
          Generated by ML Migration Bot"
          
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: success() && steps.build_api.outputs.status == 'success'
        id: create_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚀 Enable Mercado Livre Official API',
              head: process.env.MIGRATION_BRANCH,
              base: 'main',
              body: `## Mercado Livre API Migration

### ✅ Changes
- Enabled official Mercado Livre API integration
- Disabled WebView-based parsing
- Added proper authentication and error handling

### 📊 Build Status
- **Build**: ${{ steps.build_api.outputs.status }}
- **Tests**: ${{ steps.test_api.outputs.status }}
- **Lint**: ${{ steps.lint.outputs.status }}

### 🔒 API Credentials
- API Key: \`${process.env.ML_API_KEY.substring(0, 10)}...\`
- API Secret: (hidden for security)

### 🔄 Rollback
If issues arise, rollback is simple - just set \`USE_ML_API=false\` in BuildConfig

---
**Generated by ML Migration Bot**
              `
            });
            
            console.log('PR created:', pr.html_url);
            return pr.number;

      - name: Auto-merge PR
        if: success() && steps.build_api.outputs.status == 'success' && github.event.inputs.auto_merge == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.create_pr.outputs.result }};
            
            // Ждём несколько секунд для завершения проверок
            await new Promise(resolve => setTimeout(resolve, 5000));
            
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: '🚀 Mercado Livre API Migration',
                commit_message: 'Enabled official API. Parsing is deprecated.'
              });
              
              console.log('PR auto-merged successfully');
            } catch (error) {
              console.error('Failed to auto-merge:', error.message);
              // Не падаем на ошибке - PR уже создан
            }

      - name: Create Release Tag
        if: success() && steps.build_api.outputs.status == 'success'
        run: |
          VERSION="1.1.0-api-migration"
          
          git config user.name "ML Migration Bot"
          git config user.email "ml-migration@github.actions"
          git fetch origin main
          git checkout main
          git pull origin main
          
          git tag -a "v${VERSION}" -m "Mercado Livre API Migration Release
          
          - Official API support enabled
          - WebView parsing deprecated
          - See migration guide in README.md"
          
          git push origin "v${VERSION}"
          
          echo "✓ Release tag created: v${VERSION}"

      - name: Build Final Release APK
        if: success() && steps.build_api.outputs.status == 'success'
        run: |
          echo "📦 Building final release APK..."
          
          ./gradlew :app:assembleRelease \
            -PmlApiKey="$ML_API_KEY" \
            -PmlApiSecret="$ML_API_SECRET"
          
          echo "✓ Release APK built successfully"

      - name: Upload APK Artifacts
        if: success() && steps.build_api.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ml-app-api-release
          path: app/build/outputs/apk/release/
          retention-days: 30

      - name: Slack Notification Success
        if: success() && steps.build_api.outputs.status == 'success'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '✅ Mercado Livre API migration completed successfully!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit

      - name: Slack Notification Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: '❌ Mercado Livre API migration failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message

      - name: Summary
        if: always()
        run: |
          echo "## Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Validation | ${{ steps.validate_api.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build_api.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.test_api.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ steps.lint.outputs.status }} |" >> $GITHUB_STEP_SUMMARY

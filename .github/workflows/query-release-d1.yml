name: Query Release D1

on:
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: release_build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show repo root
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type d | sort

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Show release tables
        working-directory: cloudflare-tasks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute ml_tasks_release \
            --remote \
            --config wrangler.release.jsonc \
            --command "SELECT name, type FROM sqlite_master WHERE type IN ('table','index') ORDER BY type, name;"

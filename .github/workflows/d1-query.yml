name: D1 Query

on:
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Show admins
        working-directory: cloudflare-tasks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute ml_tasks --remote --command "SELECT email, display_name, role FROM users WHERE role='admin';"

      - name: Show selected users with FCM token
        working-directory: cloudflare-tasks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute ml_tasks --remote --command "SELECT user_id, email, display_name, role, fcm_token, updated_at FROM users WHERE display_name LIKE '%Robert%' OR email LIKE '%biktirob88%' OR email LIKE '%meeko.brasil2025%';"

name: codex-worker-check

on:
  push:
    branches:
      - 'codex/**'
    paths:
      - 'cloudflare-tasks/**'
      - '.github/workflows/codex-worker-check.yml'
  pull_request:
    branches:
      - 'codex/**'
    paths:
      - 'cloudflare-tasks/**'
      - '.github/workflows/codex-worker-check.yml'
  workflow_dispatch:

jobs:
  validate-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: cloudflare-tasks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            cloudflare-tasks/package-lock.json

      - name: Ensure package.json exists for validation
        shell: bash
        run: |
          if [ ! -f package.json ]; then
            cat > package.json <<'JSON'
            {
              "name": "ml-codex-worker-check",
              "private": true,
              "devDependencies": {
                "typescript": "^5.5.4",
                "wrangler": "^3.114.0"
              },
              "scripts": {
                "check": "wrangler deploy --dry-run"
              }
            }
            JSON
          fi

      - name: Install validation dependencies
        run: npm install

      - name: Validate worker with wrangler dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --dry-run

name: Init Release D1

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-tasks

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler@4.71.0

      - name: Apply schema to release D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute ml_tasks_release \
            --remote \
            --config wrangler.release.jsonc \
            --file schema.sql

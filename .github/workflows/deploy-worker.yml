name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - stable_build
    paths:
      - "cloudflare-tasks/**"
      - ".github/workflows/deploy-worker.yml"
      - "schema.sql"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show worker config
        run: |
          pwd
          ls -la
          ls -la cloudflare-tasks
          sed -n '1,200p' cloudflare-tasks/wrangler.jsonc

      - name: Install Wrangler
        run: npm install -g wrangler@4.71.0

      - name: Check Wrangler auth
        working-directory: cloudflare-tasks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler whoami

      - name: Set INTERNAL_API_TOKEN
        working-directory: cloudflare-tasks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.INTERNAL_API_TOKEN }}" | wrangler secret put INTERNAL_API_TOKEN

      - name: Apply D1 schema DEV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 execute ml_tasks --file=./schema.sql --remote

      - name: Deploy Worker
        working-directory: cloudflare-tasks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config wrangler.jsonc

name: MercadoLivre Collector

on:
  push:
    branches:
      - stable_build
    paths:
      - "collector/**"
      - ".github/workflows/collector.yml"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install collector deps
        working-directory: collector
        run: npm install

      - name: Install Playwright browser
        working-directory: collector
        run: npx playwright install chromium

      - name: Run collector
        working-directory: collector
        env:
          COLLECTOR_API_BASE: "https://ml-tasks-api.bboobb666.workers.dev"
          COLLECTOR_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          ML_ORDERS_URL: ${{ secrets.ML_ORDERS_URL }}
          HEADLESS: "true"
        run: node collector.js

      - name: Upload collector debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-debug
          path: |
            collector/collector_debug.html
            collector/collector_debug.png
          if-no-files-found: ignore

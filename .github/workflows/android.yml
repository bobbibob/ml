name: Android CI

on:
  push:
    branches: [ "main", "stable_build" ]
    paths-ignore:
      - "cloudflare-tasks/**"
      - ".github/workflows/deploy-worker.yml"
  pull_request:
    paths-ignore:
      - "cloudflare-tasks/**"
      - ".github/workflows/deploy-worker.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PATH: /home/runner/ml-release.keystore
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          python3 - <<'PY2'
          import os, base64
          data = os.environ["KEYSTORE_BASE64"].strip()
          data = "".join(data.split())
          with open("/home/runner/ml-release.keystore", "wb") as f:
              f.write(base64.b64decode(data))
          print("keystore written")
          PY2

      - name: Signing report
        run: ./gradlew :app:signingReport

      - name: Build Debug APK
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_OBJECT_KEY: ${{ secrets.R2_OBJECT_KEY }}
          R2_REGION: ${{ secrets.R2_REGION }}
          UPDATED_BY: ${{ secrets.UPDATED_BY }}
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: CI SQL checks on test database
        run: |
          set -e
          test -f testdata/data.sqlite
          ls -la testdata/data.sqlite
          echo "Tables:"
          sqlite3 testdata/data.sqlite ".tables"
          echo "svodka rows:"
          sqlite3 testdata/data.sqlite "SELECT COUNT(*) FROM svodka;"
